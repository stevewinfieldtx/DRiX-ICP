services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: fitscore
      POSTGRES_PASSWORD: fitscore
      POSTGRES_DB: fitscore
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  redis:
    image: redis:7
    ports: ["6379:6379"]

  api:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://fitscore:fitscore@db:5432/fitscore
      REDIS_URL: redis://redis:6379/0
    ports: ["8000:8000"]
    depends_on: [db, redis]

  worker:
    build: .
    command: arq app.worker.main.WorkerSettings
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://fitscore:fitscore@db:5432/fitscore
      REDIS_URL: redis://redis:6379/0
    depends_on: [db, redis]

volumes:
  pgdata:
